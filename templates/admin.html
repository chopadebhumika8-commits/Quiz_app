<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

</head>
<body>

<div class="box">

<h2>⚙️ Admin Panel</h2>

<!-- ADD QUESTION -->
<form method="post">

<select name="subject" required>
    <option value="">Select Subject</option>
    <option value="DS">Data Structure</option>
    <option value="PY">Python</option>
</select>

<select name="type" required>
    <option value="">Select Level</option>
    <option value="simple">Simple</option>
    <option value="advanced">Advanced</option>
</select>

<br><br>

<input name="question" placeholder="Question" required><br><br>
<input name="o1" placeholder="Option 1" required><br><br>
<input name="o2" placeholder="Option 2" required><br><br>
<input name="o3" placeholder="Option 3" required><br><br>
<input name="o4" placeholder="Option 4" required><br><br>
<input name="correct" placeholder="Correct Answer" required><br><br>

<button type="submit">➕ Add Question</button>

</form>

<br>

<!-- BUTTONS -->
<div style="display:flex; gap:10px; justify-content:center;">

<a href="{{ url_for('dashboard') }}">
    <button type="button">🔙 Dashboard</button>
</a>

<a href="{{ url_for('admin_logout') }}">
    <button type="button">🚪 Logout</button>
</a>

</div>

<hr>

<h3>📋 All Questions</h3>

{% if questions %}
    {% for q in questions %}
    <div style="text-align:left; margin-bottom:15px; background:#89f7fe padding:10px; border-radius:10px;">

        <p><b>❓ {{ q.question }}</b></p>
        <p>📘 {{ q.subject }} | 📂 {{ q.type }}</p>

        <a href="{{ url_for('edit', id=q.id) }}">
            <button type="button">✏️ Edit</button>
        </a>

        <a href="{{ url_for('delete', id=q.id) }}" onclick="return confirm('Delete this question?')">
            <button type="button">🗑 Delete</button>
        </a>

    </div>
    {% endfor %}
{% else %}
    <p>No questions added yet.</p>
{% endif %}

</div>

</body>
</html>
