<!DOCTYPE html>
<html>
<head>
<title>Leaderboard</title>

<link rel="stylesheet" href="/static/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>

/* TABLE STYLE */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

th {
    background: #0072ff;
    color: white;
    padding: 10px;
}

td {
    padding: 10px;
    text-align: center;
    background: rgba(255,255,255,0.9);
}

/* ROW HOVER */
tr:hover td {
    background: #e0f0ff;
    transform: scale(1.01);
}

/* TOP 3 COLORS */
.gold {
    background: #ffd700 !important;
}

.silver {
    background: #c0c0c0 !important;
}

.bronze {
    background: #cd7f32 !important;
}

</style>

</head>
<body>

<div class="box">
<h2>🏆 Leaderboard</h2>

<table>
<tr>
<th>Rank</th>
<th>User</th>
<th>Score</th>
<th>Time</th>
</tr>

{% for u in users %}
<tr class="
{% if loop.index == 1 %}gold
{% elif loop.index == 2 %}silver
{% elif loop.index == 3 %}bronze
{% endif %}
">
<td>{{ loop.index }}</td>
<td>{{ u.username }}</td>
<td>{{ u.score }} / {{ u.total }}</td>
<td>{{ u.time_taken }} sec</td>
</tr>
{% endfor %}

</table>

<br>

<a href="/dashboard">
<button>🔙 Back</button>
</a>

</div>

</body>
</html>
