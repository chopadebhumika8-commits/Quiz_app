<!DOCTYPE html>
<html>
<head>
<title>Leaderboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="box">

<h2>🏆 Leaderboard</h2>

{% if users %}
<table style="width:100%; text-align:center; color:white;">

<tr>
<th>Rank</th>
<th>User</th>
<th>Score</th>
<th>Time</th>
</tr>

{% for u in users %}
<tr>
<td>{{ loop.index }}</td>
<td>{{ u.username }}</td>
<td>{{ u.score }}/{{ u.total }}</td>
<td>{{ u.time_taken }} sec</td>
</tr>
{% endfor %}

</table>

{% else %}
<p>No data available</p>
{% endif %}

<br>

<a href="{{ url_for('dashboard') }}">
<button>🔙 Back</button>
</a>

</div>

</body>
</html>
