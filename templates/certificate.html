<!DOCTYPE html>
<html>
<head>
<title>Certificate</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;

    /* IMPORTANT: solid fallback for PDF */
    background: #764ba2;

    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* CERTIFICATE BOX */
.certificate {
    background: white;

    padding: 40px;
    width: 900px;
    max-width: 95%;

    border-radius: 20px;
    text-align: center;

    box-shadow: 0 15px 50px rgba(0,0,0,0.3);
    border: 8px solid gold;

    position: relative;
}

/* TITLE */
h1 {
    font-size: 36px;
    color: #222;
    margin-bottom: 10px;
}

/* NAME */
.name {
    font-size: 34px;
    font-weight: bold;
    color: #5b2be0;
    margin: 20px 0;
}

/* SCORE */
.score {
    font-size: 22px;
    margin-top: 10px;
    color: #333;
}

/* FOOTER */
.footer {
    margin-top: 25px;
    color: gray;
}

/* BUTTONS */
.btn {
    margin-top: 20px;
    padding: 12px 20px;

    border: none;
    border-radius: 10px;

    background: #667eea;
    color: white;

    cursor: pointer;
    font-size: 14px;

    margin-right: 10px;
}

.btn:hover {
    background: #5a67d8;
}
</style>

</head>

<body>

<div class="certificate" id="certificate">

    <h1>🎓 Certificate of Achievement</h1>

    <p>This is to certify that</p>

    <div class="name">{{ user }}</div>

    <p>has successfully completed the quiz successfully</p>

    <div class="score">🏆 Score: <b>{{ score }} / {{ total }}</b></div>

    <div class="footer">
        ✔ Verified by Quiz System
    </div>

    <button class="btn" onclick="downloadPDF()">⬇ Download PDF</button>

    <a href="{{ url_for('dashboard') }}">
        <button class="btn">🔙 Back</button>
    </a>

</div>

<!-- PDF LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
function downloadPDF() {
    const element = document.getElementById("certificate");

    html2pdf().set({
        margin: 0,
        filename: 'certificate.pdf',
        image: { type: 'jpeg', quality: 1 },
        html2canvas: {
            scale: 2,
            backgroundColor: "#ffffff"   // ⭐ IMPORTANT FIX
        },
        jsPDF: {
            unit: 'mm',
            format: 'a4',
            orientation: 'landscape'
        }
    }).from(element).save();
}
</script>

</body>
</html>
