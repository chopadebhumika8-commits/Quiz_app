<!DOCTYPE html>
<html>
<head>
<title>Result</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="box">

<h2>🏆 Result</h2>

<h3>{{score}} / {{total}}</h3>

{% if score == total %}
<p>🔥 Excellent Performance!</p>
{% elif score > total/2 %}
<p>👍 Good Job!</p>
{% else %}
<p>📘 Keep Practicing!</p>
{% endif %}

<a href="/dashboard"><button>🔙 Back</button></a>

</div>

</body>
</html>
