<!DOCTYPE html>
<html>
<head>
<title>Edit Question</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="box">
<h2>✏️ Edit Question</h2>

<form method="post">
<p>📘 Subject: {{ q.subject }}</p>
<p>📂 Type: {{ q.type }}</p>
<textarea name="question" required>{{ q.question }}</textarea><br><br>

<input name="question" value="{{ q.question }}" required><br><br>

<input name="o1" value="{{ q.option1 }}" required><br><br>
<input name="o2" value="{{ q.option2 }}" required><br><br>
<input name="o3" value="{{ q.option3 }}" required><br><br>
<input name="o4" value="{{ q.option4 }}" required><br><br>

<input name="correct" value="{{ q.correct }}" required><br><br>

<button type="submit">💾 Update</button>

</form>

<br>

<a href="/admin">
    <button type="button">🔙 Back</button>
</a>

</div>

</body>
</html>
